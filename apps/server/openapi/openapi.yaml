# OpenAPI contract for the SiteCRM REST API.
#
# This file is the source of truth for the API's shape. It is:
#   - served interactively (Swagger UI) at http://api.localhost/docs (Traefik)
#     or http://localhost:3000/docs (direct)
#   - mirrored by the Fastify JSON schemas in src/routes/ (request/response
#     validation) and by the TypeScript types in packages/types/src/index.ts
#
# When changing an endpoint, update all three places in the same commit.
openapi: 3.1.0

info:
  title: SiteCRM API
  version: 0.1.0
  description: |
    Primary REST API for SiteCRM.  Handles authentication, lead management,
    site generation, deployments, outreach sequences, and notifications.

    **Authentication:** Most endpoints require a Bearer JWT.  Obtain a token
    via `POST /api/auth/login` or `POST /api/auth/register` and pass it as
    `Authorization: Bearer <token>` on subsequent requests.
  contact:
    name: Riverfront Labs

servers:
  - url: http://api.localhost
    description: Local development (Traefik)
  - url: http://localhost:3000
    description: Direct local development

tags:
  - name: system
    description: Health and operational endpoints
  - name: auth
    description: Registration, login, and current-user

paths:
  /api/health:
    get:
      operationId: getHealth
      tags: [system]
      summary: Liveness probe
      description: |
        Returns `200 { status: "ok" }` whenever the process is responsive.
        Does not exercise the database or any external service.
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
              example:
                status: ok
                uptimeSeconds: 42.5

  /api/auth/register:
    post:
      operationId: registerUser
      tags: [auth]
      summary: Create a new account
      description: |
        Creates a user record with a bcrypt-hashed password (cost 12) and
        returns a signed JWT plus the public user object.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Account created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '409':
          description: Email already in use
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/auth/login:
    post:
      operationId: loginUser
      tags: [auth]
      summary: Sign in to an existing account
      description: |
        Verifies the supplied credentials and returns a signed JWT plus the
        public user object.  Returns `401` for any mismatch — the response
        intentionally does not reveal whether the email exists.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Invalid email or password
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/auth/me:
    get:
      operationId: getCurrentUser
      tags: [auth]
      summary: Get the current signed-in user
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    HealthResponse:
      type: object
      required: [status, uptimeSeconds]
      properties:
        status:
          type: string
          enum: [ok]
          description: Always `ok` while the service can answer requests.
        uptimeSeconds:
          type: number
          description: Seconds since the Node.js process started.

    User:
      type: object
      required: [id, email, firstName, lastName, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        firstName:
          type: string
        lastName:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    RegisterRequest:
      type: object
      required: [email, password, firstName, lastName]
      additionalProperties: false
      properties:
        email:
          type: string
          format: email
          maxLength: 255
        password:
          type: string
          minLength: 8
          maxLength: 72
          description: Stored as bcrypt hash (cost 12). Max 72 chars — bcrypt truncates beyond that.
        firstName:
          type: string
          minLength: 1
          maxLength: 100
        lastName:
          type: string
          minLength: 1
          maxLength: 100

    LoginRequest:
      type: object
      required: [email, password]
      additionalProperties: false
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 1

    AuthResponse:
      type: object
      required: [token, user]
      properties:
        token:
          type: string
          description: Signed JWT — include as `Authorization: Bearer <token>`
        user:
          $ref: '#/components/schemas/User'

    Error:
      type: object
      required: [statusCode, error, message]
      description: Standard error envelope — matches Fastify's default error shape.
      properties:
        statusCode:
          type: integer
        error:
          type: string
          description: HTTP reason phrase, e.g. `Not Found`
        message:
          type: string
          description: Human-readable explanation of what went wrong
