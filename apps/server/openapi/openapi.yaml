# OpenAPI contract for the SiteCRM REST API.
#
# This file is the source of truth for the API's shape. It is:
#   - served interactively (Swagger UI) at http://api.localhost/docs (Traefik)
#     or http://localhost:3000/docs (direct)
#   - mirrored by the Fastify JSON schemas in src/routes/ (request/response
#     validation) and by the TypeScript types in packages/types/src/index.ts
#
# When changing an endpoint, update all three places in the same commit.
openapi: 3.1.0

info:
  title: SiteCRM API
  version: 0.2.0
  description: |
    Primary REST API for SiteCRM.  Handles authentication, lead management,
    outreach, notifications, site generation, and deployments.

    **Authentication:** Most endpoints require a Bearer JWT.  Obtain a token
    via `POST /api/auth/login` or `POST /api/auth/register` and pass it as
    `Authorization: Bearer <token>` on subsequent requests.

    **Common error responses (apply to every operation unless noted):**
    - `400 Bad Request` — request body or query failed validation
      (`additionalProperties: false` rejects unknown fields).
    - `401 Unauthorized` — missing, invalid, or expired token on a protected route.
    - `503 Service Unavailable` — the database is not configured/reachable.

    All errors use the shared `Error` schema. Reusable definitions are under
    `components/responses` (`BadRequest`, `Unauthorized`, `NotFound`,
    `ServiceUnavailable`).
  contact:
    name: Riverfront Labs

servers:
  - url: http://api.localhost
    description: Local development (Traefik)
  - url: http://localhost:3000
    description: Direct local development

tags:
  - name: system
    description: Health and operational endpoints
  - name: auth
    description: Registration, login, and current-user
  - name: leads
    description: Lead pipeline — CRUD, notes, contact events
  - name: notifications
    description: In-app notification inbox and real-time SSE stream

paths:
  # ── System ──────────────────────────────────────────────────────────────────

  /api/health:
    get:
      operationId: getHealth
      tags: [system]
      summary: Liveness probe
      description: |
        Returns `200 { status: "ok" }` whenever the process is responsive.
        Does not exercise the database or any external service.
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
              example:
                status: ok
                uptimeSeconds: 42.5

  # ── Auth ─────────────────────────────────────────────────────────────────────

  /api/auth/register:
    post:
      operationId: registerUser
      tags: [auth]
      summary: Create a new account
      description: |
        Creates a user record with a bcrypt-hashed password (cost 12) and
        returns a signed JWT plus the public user object.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Account created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '409':
          description: Email already in use
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/auth/login:
    post:
      operationId: loginUser
      tags: [auth]
      summary: Sign in to an existing account
      description: |
        Verifies credentials and returns a signed JWT. Returns `401` for any
        mismatch — intentionally does not reveal whether the email exists.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Invalid email or password
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/auth/me:
    get:
      operationId: getCurrentUser
      tags: [auth]
      summary: Get the current signed-in user
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ── Leads ────────────────────────────────────────────────────────────────────

  /api/leads:
    get:
      operationId: listLeads
      tags: [leads]
      summary: List leads with optional filters
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema: { type: integer, minimum: 1, default: 1 }
        - name: pageSize
          in: query
          schema: { type: integer, minimum: 1, maximum: 200, default: 20 }
        - name: status
          in: query
          description: Filter by one or more statuses (repeat the param for multiple).
          schema:
            oneOf:
              - $ref: '#/components/schemas/LeadStatus'
              - type: array
                items:
                  $ref: '#/components/schemas/LeadStatus'
        - name: shortlisted
          in: query
          schema: { type: boolean }
        - name: search
          in: query
          description: Case-insensitive substring match on name, email, or location.
          schema: { type: string, maxLength: 200 }
      responses:
        '200':
          description: Paginated lead list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedLeads'

    post:
      operationId: createLead
      tags: [leads]
      summary: Create a new lead
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewLead'
      responses:
        '201':
          description: Lead created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Lead'

  /api/leads/{leadId}:
    parameters:
      - name: leadId
        in: path
        required: true
        schema: { type: string, format: uuid }

    get:
      operationId: getLead
      tags: [leads]
      summary: Get a single lead
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Lead found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Lead'
        '404':
          description: Lead not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    patch:
      operationId: updateLead
      tags: [leads]
      summary: Update any subset of mutable lead fields
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateLead'
      responses:
        '200':
          description: Lead updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Lead'
        '404':
          description: Lead not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    delete:
      operationId: deleteLead
      tags: [leads]
      summary: Delete a lead (cascades to notes and contact events)
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Deleted
        '404':
          description: Lead not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/leads/{leadId}/notes:
    parameters:
      - name: leadId
        in: path
        required: true
        schema: { type: string, format: uuid }

    get:
      operationId: listNotes
      tags: [leads]
      summary: List notes for a lead (newest first)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Notes list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Note'
        '404':
          description: Lead not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    post:
      operationId: createNote
      tags: [leads]
      summary: Append a note to a lead
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content]
              properties:
                content:
                  type: string
                  minLength: 1
                  maxLength: 10000
      responses:
        '201':
          description: Note created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Note'
        '404':
          description: Lead not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/leads/{leadId}/notes/{noteId}:
    parameters:
      - name: leadId
        in: path
        required: true
        schema: { type: string, format: uuid }
      - name: noteId
        in: path
        required: true
        schema: { type: string, format: uuid }

    delete:
      operationId: deleteNote
      tags: [leads]
      summary: Delete a specific note
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Deleted
        '404':
          description: Lead or note not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/leads/{leadId}/events:
    parameters:
      - name: leadId
        in: path
        required: true
        schema: { type: string, format: uuid }

    get:
      operationId: listContactEvents
      tags: [leads]
      summary: List contact events for a lead (newest first)
      description: |
        Immutable audit log of every outreach touch-point — emails sent,
        DMs sent/received, calls, meetings. Events are created by the outreach
        system (Resend webhooks, Meta Graph API webhooks) or manually.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Events list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ContactEvent'
        '404':
          description: Lead not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ── Notifications ─────────────────────────────────────────────────────────────

  /api/notifications:
    get:
      operationId: listNotifications
      tags: [notifications]
      summary: List notifications (newest first)
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema: { type: integer, minimum: 1, default: 1 }
        - name: pageSize
          in: query
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
        - name: unread
          in: query
          description: When true, returns only unread notifications.
          schema: { type: boolean }
      responses:
        '200':
          description: Paginated notification list (includes total unread count)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedNotifications'

  /api/notifications/read-all:
    post:
      operationId: markAllNotificationsRead
      tags: [notifications]
      summary: Mark all unread notifications as read
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Number of notifications marked read
          content:
            application/json:
              schema:
                type: object
                properties:
                  count:
                    type: integer

  /api/notifications/{notificationId}/read:
    parameters:
      - name: notificationId
        in: path
        required: true
        schema: { type: string, format: uuid }

    patch:
      operationId: markNotificationRead
      tags: [notifications]
      summary: Mark a single notification as read
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Updated notification
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Notification'
        '404':
          description: Notification not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/notifications/stream:
    get:
      operationId: notificationStream
      tags: [notifications]
      summary: SSE stream for real-time notifications
      description: |
        Server-Sent Events stream. The browser `EventSource` API cannot send
        custom headers, so authenticate via `?token=<jwt>` instead of
        `Authorization: Bearer`.

        Event types pushed to the client:
        - `connected` — sent immediately on open
        - `notification` — a new {@link Notification} arrived
      security:
        - bearerAuth: []
      parameters:
        - name: token
          in: query
          description: JWT — alternative to the Authorization header for EventSource clients.
          schema: { type: string }
      responses:
        '200':
          description: SSE stream (Content-Type text/event-stream)

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  # Reusable error responses — reference from operations via
  # `$ref: '#/components/responses/<Name>'`. See the info description for when
  # each applies across the API.
  responses:
    BadRequest:
      description: Request failed validation
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Missing, invalid, or expired token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    ServiceUnavailable:
      description: Database not configured or unreachable
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  schemas:
    # ── System ──────────────────────────────────────────────────────────────

    HealthResponse:
      type: object
      required: [status, uptimeSeconds]
      properties:
        status:
          type: string
          enum: [ok]
        uptimeSeconds:
          type: number

    # ── Auth ─────────────────────────────────────────────────────────────────

    User:
      type: object
      required: [id, email, firstName, lastName, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        firstName:
          type: string
        lastName:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    RegisterRequest:
      type: object
      required: [email, password, firstName, lastName]
      additionalProperties: false
      properties:
        email:
          type: string
          format: email
          maxLength: 255
        password:
          type: string
          minLength: 8
          maxLength: 72
          description: Stored as bcrypt hash (cost 12). Max 72 chars — bcrypt truncates beyond that.
        firstName:
          type: string
          minLength: 1
          maxLength: 100
        lastName:
          type: string
          minLength: 1
          maxLength: 100

    LoginRequest:
      type: object
      required: [email, password]
      additionalProperties: false
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 1

    AuthResponse:
      type: object
      required: [token, user]
      properties:
        token:
          type: string
          description: 'Signed JWT — include as `Authorization: Bearer <token>`'
        user:
          $ref: '#/components/schemas/User'

    # ── Leads ─────────────────────────────────────────────────────────────────

    LeadStatus:
      type: string
      enum: [new, contacted, qualified, proposal, won, lost]

    OutreachChannel:
      type: string
      enum: [email, facebook_dm, instagram_dm]
      description: SMS is intentionally excluded (regulatory constraints).

    ContactEventType:
      type: string
      enum:
        - email_sent
        - email_opened
        - email_clicked
        - facebook_dm_sent
        - facebook_dm_received
        - instagram_dm_sent
        - instagram_dm_received
        - call
        - meeting

    Lead:
      type: object
      required: [id, userId, name, status, shortlisted, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        name:
          type: string
        email:
          type: ['string', 'null']
          format: email
        website:
          type: ['string', 'null']
        facebookPageId:
          type: ['string', 'null']
          description: Facebook Page ID for Messenger outreach.
        instagramAccountId:
          type: ['string', 'null']
          description: Instagram Business Account ID for DM outreach.
        websiteScore:
          type: ['number', 'null']
          description: 0–100 score from the intelligence website analyser.
        websiteGrade:
          type: ['string', 'null']
        websiteNotes:
          type: ['string', 'null']
        score:
          type: ['number', 'null']
          description: Composite intelligence score (0–100).
        rating:
          type: ['number', 'null']
          description: Google Places star rating (1–5).
        reviews:
          type: ['integer', 'null']
        type:
          type: ['string', 'null']
          description: Business category (e.g. "restaurant", "law firm").
        location:
          type: ['string', 'null']
        placeId:
          type: ['string', 'null']
          description: Google Places ID.
        linkedSiteId:
          type: ['string', 'null']
          format: uuid
        status:
          $ref: '#/components/schemas/LeadStatus'
        shortlisted:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    NewLead:
      type: object
      required: [name]
      additionalProperties: false
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
        email:
          type: string
          format: email
          maxLength: 255
        website:
          type: string
          maxLength: 512
        facebookPageId:
          type: string
          maxLength: 255
        instagramAccountId:
          type: string
          maxLength: 255
        type:
          type: string
          maxLength: 100
        location:
          type: string
          maxLength: 255
        placeId:
          type: string
          maxLength: 255
        status:
          $ref: '#/components/schemas/LeadStatus'
        shortlisted:
          type: boolean

    UpdateLead:
      type: object
      additionalProperties: false
      minProperties: 1
      description: All fields are optional — only supplied fields are updated.
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
        email:
          type: ['string', 'null']
          format: email
          maxLength: 255
        website:
          type: ['string', 'null']
          maxLength: 512
        facebookPageId:
          type: ['string', 'null']
          maxLength: 255
        instagramAccountId:
          type: ['string', 'null']
          maxLength: 255
        websiteScore:
          type: ['number', 'null']
          minimum: 0
          maximum: 100
        websiteGrade:
          type: ['string', 'null']
          maxLength: 10
        websiteNotes:
          type: ['string', 'null']
          maxLength: 1000
        score:
          type: ['number', 'null']
          minimum: 0
          maximum: 100
        rating:
          type: ['number', 'null']
          minimum: 0
          maximum: 5
        reviews:
          type: ['integer', 'null']
          minimum: 0
        type:
          type: ['string', 'null']
          maxLength: 100
        location:
          type: ['string', 'null']
          maxLength: 255
        placeId:
          type: ['string', 'null']
          maxLength: 255
        status:
          $ref: '#/components/schemas/LeadStatus'
        shortlisted:
          type: boolean
        linkedSiteId:
          type: ['string', 'null']
          format: uuid

    PaginatedLeads:
      type: object
      required: [data, total, page, pageSize]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Lead'
        total:
          type: integer
          description: Total matching leads across all pages.
        page:
          type: integer
        pageSize:
          type: integer

    Note:
      type: object
      required: [id, leadId, content, createdAt]
      properties:
        id:
          type: string
          format: uuid
        leadId:
          type: string
          format: uuid
        content:
          type: string
        createdAt:
          type: string
          format: date-time

    ContactEvent:
      type: object
      required: [id, leadId, type, channel, direction, createdAt]
      properties:
        id:
          type: string
          format: uuid
        leadId:
          type: string
          format: uuid
        type:
          $ref: '#/components/schemas/ContactEventType'
        channel:
          $ref: '#/components/schemas/OutreachChannel'
        direction:
          type: string
          enum: [sent, received]
        detail:
          type: ['string', 'null']
        externalId:
          type: ['string', 'null']
          description: Provider message ID used for deduplication.
        createdAt:
          type: string
          format: date-time

    # ── Notifications ─────────────────────────────────────────────────────────

    NotificationType:
      type: string
      enum:
        - dm_received
        - email_reply
        - lead_status_change
        - deployment_complete
        - build_complete
        - job_complete
        - job_failed

    Notification:
      type: object
      required: [id, userId, type, title, body, read, createdAt]
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        type:
          $ref: '#/components/schemas/NotificationType'
        title:
          type: string
        body:
          type: string
        data:
          type: ['object', 'null']
          description: Arbitrary JSON payload — e.g. `{ leadId }` for deep-link navigation.
        read:
          type: boolean
        readAt:
          type: ['string', 'null']
          format: date-time
        createdAt:
          type: string
          format: date-time

    PaginatedNotifications:
      type: object
      required: [data, total, page, pageSize, unreadCount]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Notification'
        total:
          type: integer
        page:
          type: integer
        pageSize:
          type: integer
        unreadCount:
          type: integer
          description: Total unread count across all pages — use for badge display.

    # ── Shared ────────────────────────────────────────────────────────────────

    Error:
      type: object
      required: [statusCode, error, message]
      description: Standard error envelope — matches Fastify's default error shape.
      properties:
        statusCode:
          type: integer
        error:
          type: string
          description: HTTP reason phrase, e.g. `Not Found`
        message:
          type: string
          description: Human-readable explanation of what went wrong
